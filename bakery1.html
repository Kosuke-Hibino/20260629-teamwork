<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>おすすめのパン屋紹介サイト</title>
        <meta name="description" content="おすすめのパン屋">
        <meta name="viewport" content="width=device-width">
        <script src="js/toggle-menu.js"></script>

        <link href="css/common.css" rel="stylesheet">
        <link href="css/bakery1.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">

    <body>
        <!--header ここから-->
        <header class="header">
            <div class="header-inner">
                <a class="header-logo" href="index.html">
                    <img src="images/common/logo.png" alt="ロゴ">
                </a>
                <h1>おすすめパン屋紹介サイト</h1>
            </div>
        </header>
        <!--header ここまで-->
        <!--main ここから-->
        <main class="main">
            <nav class="floating">
                <ul>
                    <li><a href="#top">トップ</a></li>
                </ul>
            </nav>
            <div class="title">
                <h1>ポンシェ</h1>
            </div>
            <div class="feature">
                <div class="feature-text">
                    <h2>たくさんのパン職人が育つ名店</h2>
                    <p>平日休日問わずつねに行列ができています。</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-text">
                    <h2>圧倒的なうまみの明太フランス</h2>
                    <p>明太の風味が引き立つ、圧倒的なうまみのフランスパン</p>
                    <p>博多”ふくや”の明太子を使用しています!</p>
                    <p>人気でつねに焼きたてが揃っています!</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-text">
                    <h2>どのメニューも人気!</h2>
                    <p>長年にわたって人気のパンは洗練されたメニュー</p>
                    <p>季節のメニューもおいしいものばかりです</p>
                </div>
            </div>
            <div class="images">
                <h2>明太フランス(明太子フィセル)</h2>
                <img src="images/bakery1/bread.png" alt="ロゴ">
            </div>                
            <div class="map">
                <h2>アクセス</h2>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3262.899923244365!2d136.93437367576342!3d35.134170872768685!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60037a674b3dc5b5%3A0xb83e419892324b6!2z44Od44Oz44K344Kn!5e0!3m2!1sja!2sjp!4v1783921480870!5m2!1sja!2sjp" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>

        <!--main ここまで-->
        <!--footer ここから-->
        <footer class="footer">
            <a class="footer-logo" href="index.html">
                <img src="images/common/logo.png" alt="ロゴ">

            <h1>おすすめパン屋紹介サイト</h1>
